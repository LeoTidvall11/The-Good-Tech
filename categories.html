<!doctype html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Good Tech | Positive Tech News</title>
    <script type="module" src="/src/js/categories.js"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>

  <body class="bg-brand-cream text-brand-dark font-body">
    <!-- ===================== HEADER ===================== -->
    <header class="site-header">
      <!-- Empty spacer — pushes the logo to the center on desktop  -->
      <div class="hidden md:block"></div>

      <!-- Site logo / brand name -->
      <div class="header-logo">
        <a href="index.html">
          <h1 class="font-display text-4xl font-black whitespace-nowrap italic">
            The Good Tech
          </h1>
        </a>
      </div>

      <!-- Action buttons: Subscribe & Login -->
      <div class="header-actions">
        <button class="btn">Subscribe</button>
        <button class="btn">Login</button>
      </div>
    </header>
    <!-- ===================== /HEADER ===================== -->

    <!-- ===================== NAVBAR ===================== -->
    <!-- Sticky navigation bar with a search field and category links -->
    <nav class="site-nav">
      <!-- Search field — expands on focus via CSS animation -->
      <div class="nav-search">
        <div class="nav-search-icon">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            fill="none"
            viewBox="0 0 24 24"
            stroke-width="2.5"
            stroke="currentColor"
            class="size-5"
          >
            <path
              stroke-linecap="round"
              stroke-linejoin="round"
              d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z"
            />
          </svg>
        </div>
        <input
          type="text"
          placeholder="Search for good news..."
          class="nav-search-input"
        />
      </div>

      <!-- Category navigation links -->
      <ul class="nav-links">
        <li><a href="#cat-AI" class="nav">AI</a></li>
        <li><a href="#cat-Crypto" class="nav">Crypto</a></li>
        <li><a href="#more-cat-Odd" class="nav">Odd</a></li>
        <li><a href="#more-cat-Breakthroughs" class="nav">Breakthroughs</a></li>
        <li>
          <a href="#more-cat-Sustainability" class="nav">Sustainability</a>
        </li>
        <li><a href="#more-cat-Health" class="nav">Health</a></li>
        <li><a href="#more-cat-Ocean" class="nav">Ocean</a></li>
        <li><a href="#more-cat-Space" class="nav">Space</a></li>
        <li><a href="#more-cat-Energy" class="nav">Energy</a></li>
      </ul>
    </nav>
    <!-- ===================== /NAVBAR ===================== -->

    <main class="flex flex-col">
      <a
        href="index.html"
        class="btn bg-brand-dark/60 fixed bottom-6 left-1/2 z-10 -translate-x-1/2 backdrop-blur-sm"
      >
        ← Back to home
      </a>
      <!-- ---- ARTICLE SECTION ---- -->
      <div
        class="articles-section-categories categories-scroll-section flex flex-col"
      >
        <h2 id="cat-AI" class="categories-label bg-cat-ai">AI</h2>
        <div
          id="categories-carousel-AI"
          class="categories-carousel flex gap-3 overflow-x-auto py-4"
        ></div>
      </div>
      <div
        class="articles-section-categories categories-scroll-section flex flex-col"
      >
        <h2 id="cat-Crypto" class="categories-label bg-cat-crypto">Crypto</h2>
        <div
          id="categories-carousel-Crypto"
          class="categories-carousel flex gap-3 overflow-x-auto py-4"
        ></div>
      </div>
      <div class="more-categories-section">
        <h2 class="more-categories-heading">More Categories</h2>
        <div id="more-categories-grid" class="more-categories-grid"></div>
      </div>
    </main>

    <!-- ===================== Footer ===================== -->

    <footer class="site-footer">
      <div class="footer-internal">
        <p>&copy; 2026 The Good Tech. All rights reserved.</p>
        <div class="footer-links">
          <a href="#" class="footer-link">Privacy Policy</a>
          <a href="#" class="footer-link">Terms of Service</a>
          <a href="#" class="footer-link">Contact Us</a>
        </div>
      </div>
      <div class="footer-social">
        <a
          href="https://github.com/LeoTidvall11/The-Good-Tech.git"
          target="_blank"
          class="footer-social-icons"
        >
          <i class="fa-brands fa-github text-xl"></i>
        </a>

        <a
          href="https://facebook.com/"
          target="_blank"
          class="footer-social-icons"
        >
          <i class="fa-brands fa-facebook text-xl"></i>
        </a>

        <a
          href="https://linkedin.com/in/leo-tidvall"
          target="_blank"
          class="footer-social-icons"
        >
          <i class="fa-brands fa-linkedin text-xl"></i>
        </a>
      </div>
    </footer>
    <!-- ===================== /Footer ===================== -->
  </body>
</html>
